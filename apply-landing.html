<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 学情洞察 - 申请试用</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }
    .container {
      width: 100%;
      max-width: 448px;
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: #3b82f6;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .logo svg {
      width: 32px;
      height: 32px;
      color: white;
    }
    .header h1 {
      font-size: 30px;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 16px;
      color: #94a3b8;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .card h2 {
      font-size: 20px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
      text-align: center;
    }
    .card .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 24px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 4px;
    }
    .form-group label .required {
      color: #f87171;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      background: #334155;
      border: 1px solid #475569;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #64748b;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .form-group textarea {
      resize: none;
      min-height: 80px;
    }
    .error {
      padding: 12px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      color: #fca5a5;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: #3b82f6;
      color: white;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-submit:hover {
      background: #2563eb;
    }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Pay step */
    .pay-step { display: none; }
    .pay-step.active { display: block; }
    .success-icon {
      width: 64px;
      height: 64px;
      background: rgba(34,197,94,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .success-icon svg {
      width: 32px;
      height: 32px;
      color: #4ade80;
    }
    .app-id {
      font-family: monospace;
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 24px;
    }
    .qr-box {
      background: #334155;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .qr-box h3 {
      font-size: 18px;
      font-weight: 500;
      color: white;
      margin-bottom: 16px;
    }
    .qr-placeholder {
      width: 176px;
      height: 176px;
      background: white;
      border-radius: 12px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 13px;
      text-align: center;
      padding: 16px;
    }
    .qr-box .hint {
      font-size: 14px;
      color: #94a3b8;
    }
    .steps {
      text-align: left;
      font-size: 14px;
      color: #94a3b8;
      line-height: 2;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
          <circle cx="12" cy="13" r="3"/>
        </svg>
      </div>
      <h1>WinGo 学情洞察</h1>
      <p>拍一下，秒懂孩子学习情况</p>
    </div>

    <!-- Form Step -->
    <div class="card" id="form-step">
      <h2>申请试用名额</h2>
      <p class="subtitle">首批仅限 50 家企业，审核通过需缴纳 ¥500 押金锁定名额</p>

      <form id="apply-form">
        <div class="form-group">
          <label>公司名称 <span class="required">*</span></label>
          <input type="text" id="company" required placeholder="请输入公司名称">
        </div>
        <div class="form-group">
          <label>联系人姓名 <span class="required">*</span></label>
          <input type="text" id="contactName" required placeholder="请输入联系人姓名">
        </div>
        <div class="form-group">
          <label>联系电话 <span class="required">*</span></label>
          <input type="tel" id="phone" required placeholder="请输入手机号">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="email" placeholder="请输入邮箱（选填）">
        </div>
        <div class="form-group">
          <label>想解决什么问题</label>
          <textarea id="problem" rows="3" placeholder="简单描述您想通过 WinGo 解决的教育场景问题（选填）"></textarea>
        </div>

        <div class="error" id="error-msg"></div>

        <button type="submit" class="btn-submit" id="submit-btn">
          <span>提交申请</span>
        </button>
      </form>
    </div>

    <!-- Pay Step -->
    <div class="card pay-step" id="pay-step">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h2>申请已提交</h2>
      <p class="app-id" id="app-id"></p>

      <div class="qr-box">
        <h3>请支付 ¥500 押金锁定名额</h3>
        <div class="qr-placeholder">
          请放置公司收款码图片<br>到 public/company-qr.png
        </div>
        <p class="hint">微信支付扫码，备注「<span id="pay-note"></span>」</p>
      </div>

      <div class="steps">
        <p>1. 扫码支付 ¥500 押金</p>
        <p>2. 备注公司名称 + 联系人姓名</p>
        <p>3. 我们将在 24 小时内审核并开通账号</p>
        <p>4. 开通后会短信/微信通知您</p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('apply-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');
    const formStep = document.getElementById('form-step');
    const payStep = document.getElementById('pay-step');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="spinner"></div><span>提交中...</span>';

      const data = {
        company: document.getElementById('company').value,
        contactName: document.getElementById('contactName').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        problem: document.getElementById('problem').value,
      };

      try {
        const res = await fetch('/xsc/api/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const json = await res.json();

        if (!json.success) {
          throw new Error(json.error || '提交失败');
        }

        // Show pay step
        formStep.style.display = 'none';
        payStep.classList.add('active');
        document.getElementById('app-id').textContent = '申请编号：' + json.applicationId;
        document.getElementById('pay-note').textContent = data.company + '-' + data.contactName;
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>提交申请</span>';
      }
    });
  </script>
</body>
</html>
